<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convite • Aniversário da Andressa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* Fundo ajustado para caber a arte toda sem cortes */
        .convite {
            width: 100vw;
            height: 100vh;
            background: url("capa.png") center / contain no-repeat;
            background-color: #000;
            position: relative;
            animation: aparecer 1s ease-out;
        }

        @keyframes aparecer {
            from { opacity: 0; transform: scale(1.03); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Aviso de música */
        .aviso-musica {
            position: fixed;
            top: 2%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 7px 18px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0.85;
            animation: piscar 2.5s infinite alternate;
            pointer-events: none;
            box-shadow: 0 0 12px rgba(255,255,255,0.3);
        }

        @keyframes piscar {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }

        /* Botão COMO CHEGAR - posição exata na arte */
        .link-mapa {
            position: absolute;
            top: 66%;
            right: 4%;
            width: 22%;
            height: 9%;
            cursor: pointer;
            z-index: 999;
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
            transition: all 0.3s ease;
        }

        .link-mapa:hover, .link-mapa:active {
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 22px rgba(255, 255, 255, 0.35);
            transform: scale(1.04);
        }

        /* Botão CONFIRMAR PRESENÇA - posição exata na arte */
        .link-whatsapp {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            height: 11%;
            cursor: pointer;
            z-index: 999;
            border-radius: 12px;
            background: rgba(255, 20, 255, 0.03);
            transition: all 0.3s ease;
        }

        .link-whatsapp:hover, .link-whatsapp:active {
            background: rgba(255, 20, 255, 0.15);
            box-shadow: 0 0 28px rgba(255, 20, 255, 0.4);
            transform: translateX(-50%) scale(1.02);
        }

        /* Música invisível, sem atrapalhar cliques */
        #musica {
            position: fixed;
            top: -9999px;
            left: -9999px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="convite" id="tela">
        <!-- Aviso da música -->
        <div class="aviso-musica">🎵 Toque em qualquer lugar para ouvir a música</div>

        <!-- Link para o Mapa -->
        <a 
            href="https://www.google.com/maps?q=Buffet+Tik+%26+Tok+Maia,+Av.+Papa+Jo%C3%A3o+XXIII,+64+-+Parque+Renato+Maia,+Guarulhos+-+SP,+07114-100" 
            target="_blank" 
            class="link-mapa"
            onclick="iniciarMusica()"
        ></a>

        <!-- Link WhatsApp com mensagem exata -->
        <a 
            href="https://wa.me/5511979567755?text=Olá! Confirmo minha presença na festa da Andressa 🎉%0A%0ADia: 29/07/2026 às 19h30%0A%0A⚠️ Confirmações até o dia 20/07%0A%0APor favor, informe:%0A✅ Nome completo:%0A✅ Se for criança, qual a idade:" 
            target="_blank" 
            class="link-whatsapp"
            onclick="iniciarMusica()"
        ></a>

        <!-- Música -->
        <audio id="musica" loop preload="auto">
            <source src="festa.mp3" type="audio/mpeg">
        
    </div>

    <script>
        let tocou = false;
        const audio = document.getElementById("musica");
        const aviso = document.querySelector(".aviso-musica");

        function iniciarMusica() {
            if (!tocou) {
                audio.play()
                    .then(() => {
                        tocou = true;
                        // Esconde o aviso suavemente após tocar
                        aviso.style.transition = "opacity 0.6s ease";
                        aviso.style.opacity = "0";
                        setTimeout(() => aviso.style.display = "none", 600);
                    })
                    .catch(erro => console.log("Aguardando interação:", erro));
            }
        }

        // Funciona em celular e computador
        document.addEventListener("touchstart", iniciarMusica);
        document.addEventListener("click", iniciarMusica);
    </script>
</body>
</html>
