<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Andressa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        .convite {
            width: 100vw;
            height: 100vh;
            background: url("capa.png") center / contain no-repeat;
            position: relative;
        }
        .aviso {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10000;
            pointer-events: none;
        }

        /* Botões */
        .botao-mapa {
            position: absolute;
            top: 62%;
            right: 4%;
            width: 22%;
            height: 9%;
            z-index: 99999;
            cursor: pointer;
            background: transparent;
            border: none;
        }

        .botao-confirmar {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 88%;
            height: 10%;
            z-index: 99999;
            cursor: pointer;
            background: transparent;
            border: none;
        }
    </style>
</head>
<body>
    <div class="convite">
        <div class="aviso">🎵 Toque em qualquer lugar para ouvir a música</div>

        <!-- Botão Mapa continua igual -->
        <a href="https://www.google.com/maps?q=Buffet+Tik+%26+Tok+Maia,+Av.+Papa+João+XXIII,+64+-+Parque+Renato+Maia,+Guarulhos+-+SP,+07114-100" target="_blank" class="botao-mapa"></a>

        <!-- Botão Confirmar Presença → agora aponta para o seu formulário -->
        <a href="https://forms.office.com/Pages/ResponsePage.aspx?id=DQSIkWdsW0yxEjajBLZtrQAAAAAAAAAAAAYAAJqHeslUNVI3VEE4OUJFTkZINFFQMDRMVzVHMVVVWi4u" target="_blank" class="botao-confirmar"></a>

        <!-- Música continua funcionando -->
        <audio id="musica" loop preload="auto" style="position: fixed; top: -9999px; left: -9999px;">
            <source src="festa.mp3" type="audio/mpeg">
            <source src="mundo.mp3" type="audio/mpeg">
            <source src="musica.mp3" type="audio/mpeg">
        
    </div>

    <script>
        let iniciou = false;
        const musica = document.getElementById("musica");

        document.addEventListener("click", function(e) {
            if (!iniciou && !e.target.classList.contains("botao-mapa") && !e.target.classList.contains("botao-confirmar")) {
                musica.play().catch(() => {});
                iniciou = true;
                document.querySelector(".aviso").style.opacity = "0";
            }
        });

        document.addEventListener("touchstart", function(e) {
            if (!iniciou && !e.target.classList.contains("botao-mapa") && !e.target.classList.contains("botao-confirmar")) {
                musica.play().catch(() => {});
                iniciou = true;
                document.querySelector(".aviso").style.opacity = "0";
            }
        });
    </script>
</body>
</html>
