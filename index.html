<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convite de Aniversário - Andressa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        .convite {
            width: 100vw;
            height: 100vh;
            background: url("capa.png") center / contain no-repeat;
            position: relative;
        }

        /* Botão Como chegar → Google Maps */
        .link-mapa {
            position: absolute;
            top: 58%;
            right: 7%;
            width: 22%;
            height: 10%;
            cursor: pointer;
        }

        /* Botão Confirmar presença → WhatsApp */
        .link-whatsapp {
            position: absolute;
            bottom: 13%;
            left: 12%;
            width: 76%;
            height: 9%;
            cursor: pointer;
        }

        /* Áudio invisível */
        #musica {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="convite" onclick="tocarMusica()">
        <a 
            href="https://www.google.com/maps?q=Buffet+Tik+%26+Tok+Maia,+Av.+Papa+Jo%C3%A3o+XXIII,+64+-+Parque+Renato+Maia,+Guarulhos+-+SP,+07114-100" 
            target="_blank" 
            class="link-mapa"
        ></a>

        <a 
            href="https://wa.me/5511979567755?text=Olá! Confirmo minha presença na festa da Andressa dia 29/07 às 19h30.%0A%0APor favor, informe:%0A✅ Nome completo:%0A✅ Se for criança, qual a idade:" 
            target="_blank" 
            class="link-whatsapp"
        ></a>

        <audio id="musica" src="musica.mpeg" loop preload="auto">
    </div>

    <script>
        function tocarMusica() {
            const audio = document.getElementById('musica');
            if (audio.paused) {
                audio.play().catch(() => {});
            }
        }
    </script>
</body>
</html>
