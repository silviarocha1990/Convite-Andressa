<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Andressa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        .convite {
            width: 100vw;
            height: 100vh;
            background: url("capa.png") center / contain no-repeat;
            position: relative;
        }
        .aviso {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 1000;
            pointer-events: none;
        }
        .botao-mapa {
            position: absolute;
            top: 62%;
            right: 4%;
            width: 22%;
            height: 9%;
            cursor: pointer;
            z-index: 999;
        }
        .botao-confirmar {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 8%;
            cursor: pointer;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="convite">
        <div class="aviso">🎵 Toque em qualquer lugar para ouvir a música</div>

        <a href="https://www.google.com/maps?q=Buffet+Tik+%26+Tok+Maia,+Av.+Papa+João+XXIII,+64+-+Parque+Renato+Maia,+Guarulhos+-+SP,+07114-100" target="_blank" class="botao-mapa"></a>

        <a href="https://wa.me/5511979567755?text=Olá! Confirmo minha presença na festa da Andressa 🎉%0A%0ADia: 29/07/2026 às 19h30%0A%0A⚠️ Confirmações até o dia 20/07%0A👉 Caso não consiga comparecer, pedimos que avise também.%0A%0APor favor, informe:%0A✅ Nome completo:%0A✅ Se for criança, qual a idade:" target="_blank" class="botao-confirmar"></a>

        <audio id="musica" loop preload="auto" style="display: none;">
            <source src="festa.mp3" type="audio/mpeg">
            <source src="mundo.mp3" type="audio/mpeg">
            <source src="musica.mp3" type="audio/mpeg">
            <source src="musica.mpeg" type="audio/mpeg">
        
    </div>

    <script>
        let jaTocou = false;
        const audio = document.getElementById("musica");
        const aviso = document.querySelector(".aviso");

        function iniciarMusica() {
            if (!jaTocou) {
                audio.load();
                audio.play()
                    .then(() => {
                        jaTocou = true;
                        aviso.style.opacity = "0";
                        setTimeout(() => aviso.style.display = "none", 500);
                    })
                    .catch(() => {
                        aviso.textContent = "Toque novamente para iniciar a música";
                    });
            }
        }

        document.addEventListener("click", iniciarMusica);
        document.addEventListener("touchstart", iniciarMusica);
    </script>
</body>
</html>
