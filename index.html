<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convite de Aniversário - Andressa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        .convite {
            width: 100vw;
            height: 100vh;
            background: url("capa.png") center / contain no-repeat;
            position: relative;
        }

        /* Área clicável do mapa */
        .link-mapa {
            position: absolute;
            top: 61%;
            right: 9%;
            width: 21%;
            height: 12%;
            cursor: pointer;
        }

        /* Área clicável do WhatsApp */
        .link-whatsapp {
            position: absolute;
            bottom: 10%;
            left: 12%;
            width: 76%;
            height: 10%;
            cursor: pointer;
        }

        /* Áudio automático */
        audio {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="convite">
        <!-- Link completo para o Google Maps -->
        <a href="https://www.google.com/maps?q=Buffet+Tik+%26+Tok+Maia,+Av.+Papa+Jo%C3%A3o+XXIII,+64+-+Parque+Renato+Maia,+Guarulhos+-+SP" target="_blank" class="link-mapa"></a>

        <!-- Link completo para o seu WhatsApp -->
        <a href="https://wa.me/5511979567755?text=Olá! Confirmo minha presença na festa da Andressa, dia 29/07 às 19h30. Obrigado!" target="_blank" class="link-whatsapp"></a>

        <!-- Música automática -->
        <audio src="musica.mpeg" autoplay loop>
            Seu navegador não suporta reproduzir o áudio.
        
    </div>
</body>
</html>
