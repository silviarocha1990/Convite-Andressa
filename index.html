<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convite de Aniversário - Andressa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* Apenas a imagem de fundo, ocupando a tela toda */
        .convite {
            width: 100vw;
            height: 100vh;
            background: url("capa.png") center / contain no-repeat;
            /* "contain" ajusta a imagem inteira sem cortar nada */
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 5vh;
        }

        /* Só mantém o player da música, nada mais */
        audio {
            width: 85%;
            max-width: 400px;
            border-radius: 8px;
            background: rgba(255,255,255,0.15);
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="convite">
        <!-- Apenas a música, sem nenhum texto ou botão extra -->
        <audio controls>
            <source src="musica.mpeg" type="audio/mpeg">
            Seu navegador não suporta reproduzir o áudio.
        
    </div>
</body>
</html>
