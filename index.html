<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Andressa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
        }
        .convite {
            width: 100%;
            height: 100%;
            background: url("capa.png") center / contain no-repeat;
            position: relative;
        }
        .aviso {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10;
        }
        .mapa {
            position: absolute;
            top: 62%;
            right: 4%;
            width: 22%;
            height: 9%;
            z-index: 20;
        }
        .confirmar {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 8%;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div class="convite">
        <div class="aviso">🎵 Toque para ouvir a música</div>

        <a href="https://www.google.com/maps?q=Buffet+Tik+%26+Tok+Maia,+Av.+Papa+João+XXIII,+64+-+Parque+Renato+Maia,+Guarulhos+-+SP" target="_blank" class="mapa"></a>

        <a href="https://wa.me/5511979567755?text=Olá! Confirmo presença na festa da Andressa 🎉%0ADia:29/07/2026 às 19h30" target="_blank" class="confirmar"></a>

        <audio id="musica" src="festa.mp3" loop preload="auto" style="display:none;">
    </div>

    <script>
        let iniciou = false;
        const musica = document.getElementById("musica");
        const aviso = document.querySelector(".aviso");

        document.addEventListener("click", () => {
            if (!iniciou) {
                musica.play().catch(e => {});
                iniciou = true;
                aviso.style.display = "none";
            }
        });
        document.addEventListener("touchstart", () => {
            if (!iniciou) {
                musica.play().catch(e => {});
                iniciou = true;
                aviso.style.display = "none";
            }
        });
    </script>
</body>
</html>
