<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convite de Aniversário - Andressa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* Imagem ocupando toda a tela sem cortes */
        .convite {
            width: 100vw;
            height: 100vh;
            background: url("capa.png") center / contain no-repeat;
            position: relative;
        }

        /* Área do botão "Como chegar" → Google Maps */
        .link-mapa {
            position: absolute;
            top: 63%;
            right: 8%;
            width: 20%;
            height: 11%;
            cursor: pointer;
        }

        /* Área do botão "Confirmar Presença" → WhatsApp */
        .link-whatsapp {
            position: absolute;
            bottom: 12%;
            left: 13%;
            width: 74%;
            height: 9%;
            cursor: pointer;
        }

        /* Áudio visível inicialmente para funcionar em todos os celulares */
        .audio-player {
            position: absolute;
            bottom: 2%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 350px;
            z-index: 10;
            border-radius: 8px;
            background: rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>
    <div class="convite">
        <!-- Link para o Google Maps do Buffet -->
        <a 
            href="https://www.google.com/maps?q=Buffet+Tik+%26+Tok+Maia,+Av.+Papa+Jo%C3%A3o+XXIII,+64+-+Parque+Renato+Maia,+Guarulhos+-+SP,+07114-100" 
            target="_blank" 
            class="link-mapa"
        ></a>

        <!-- Link do WhatsApp com mensagem atualizada -->
        <a 
            href="https://wa.me/5511979567755?text=Olá! Confirmo minha presença na festa da Andressa dia 29/07 às 19h30. 🎉%0A%0APor favor, informe:%0A✅ Nome do convidado:%0A✅ Se for criança, qual a idade:" 
            target="_blank" 
            class="link-whatsapp"
        ></a>

        <!-- Música ajustada para funcionar em todos os navegadores -->
        <audio src="musica.mpeg" controls loop class="audio-player">
            Seu navegador não suporta reproduzir áudio.
        
    </div>
</body>
</html>
