<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Andressa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: Arial, sans-serif; }
        .convite {
            width: 100vw;
            height: 100vh;
            background: url("capa.png") center / contain no-repeat;
            position: relative;
        }
        .aviso-musica {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 1000;
        }
        .contagem {
            position: absolute;
            top: 68%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: #ffdd00;
            padding: 6px 15px;
            border-radius: 6px;
            min-width: 130px;
            text-align: center;
            z-index: 999;
        }
        .contagem .titulo { font-size: 13px; margin-bottom: 3px; }
        .contagem .numeros { font-size: 20px; font-weight: bold; }
        .link-mapa {
            position: absolute;
            top: 62%;
            right: 5%;
            width: 20%;
            height: 9%;
            cursor: pointer;
            z-index: 999;
        }
        .link-confirmar {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 8%;
            cursor: pointer;
            z-index: 999;
        }
        .botao-fotos {
            position: absolute;
            top: 62%;
            left: 50%;
            transform: translateX(-50%);
            width: 20%;
            height: 9%;
            cursor: pointer;
            z-index: 999;
        }
        .galeria {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.97);
            z-index: 2000;
            padding: 30px 15px;
            overflow-y: auto;
            display: none;
        }
        .galeria.aberta { display: block; }
        .fechar {
            position: fixed;
            top: 15px; right: 20px;
            background: #ff2288;
            color: white; border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
        }
        .grade {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 700px;
            margin: 20px auto;
        }
        .grade img { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="convite" onclick="tocarMusica()">
        <div class="aviso-musica">🎵 Toque para ouvir a música</div>

        <div class="contagem">
            <div>FALTAM</div>
            <div id="contador"></div>
            <div>PARA A FESTA!</div>
        </div>

        <a href="https://www.google.com/maps?q=Buffet+Tik+%26+Tok+Maia,+Av.+Papa+João+XXIII,+64+-+Parque+Renato+Maia,+Guarulhos+-+SP" target="_blank" class="link-mapa"></a>

        <a href="https://wa.me/5511979567755?text=Olá! Confirmo presença na festa da Andressa 🎉%0ADia:29/07/2026 às 19h30" target="_blank" class="link-confirmar"></a>

        <button class="botao-fotos" onclick="abrirGaleria()"></button>

        <div class="galeria" id="galeria">
            <button class="fechar" onclick="fecharGaleria()">&times;</button>
            <h2 style="color:#fff; text-align:center;">Momentos da Andressa 💖</h2>
            <div class="grade">
                <img src="foto1.jpg">
                <img src="foto2.jpg">
                <img src="foto3.jpg">
                <img src="foto4.jpg">
                <img src="foto5.jpg">
                <img src="foto6.jpg">
                <img src="foto7.jpg">
                <img src="foto8.jpg">
                <img src="foto9.jpg">
            </div>
        </div>

        <audio id="musica" src="festa.mp3" loop preload="auto">
            <source src="mundo.mp3" type="audio/mpeg">
            <source src="musica.mpeg" type="audio/mpeg">
        
    </div>

    <script>
        function atualizarContagem() {
            const festa = new Date("2026-07-29T19:30:00-03:00");
            const agora = new Date();
            const diff = festa - agora;
            if (diff <= 0) {
                document.getElementById("contador").textContent = "É HOJE! 🎉";
                return;
            }
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            document.getElementById("contador").textContent = ${d}d ${h}h ${m}m;
        }
        atualizarContagem();
        setInterval(atualizarContagem, 60000);

        let tocou = false;
        function tocarMusica() {
            if (!tocou) {
                document.getElementById("musica").play().catch(e=>console.log("Música:", e));
                tocou = true;
                document.querySelector(".aviso-musica").style.display = "none";
            }
        }

        function abrirGaleria() {
            document.getElementById("galeria").classList.add("aberta");
            tocarMusica();
        }
        function fecharGaleria() {
            document.getElementById("galeria").classList.remove("aberta");
        }
    </script>
</body>
</html>
