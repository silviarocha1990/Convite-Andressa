<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convite • Aniversário da Andressa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* Fundo principal com efeito suave */
        .convite {
            width: 100vw;
            height: 100vh;
            background: url("capa.png") center / contain no-repeat;
            position: relative;
            transition: all 0.4s ease;
        }

        /* Botão Como Chegar com estilo */
        .link-mapa {
            position: absolute;
            top: 58%;
            right: 7%;
            width: 22%;
            height: 10%;
            cursor: pointer;
            z-index: 999;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .link-mapa:hover {
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 25px rgba(255,255,255,0.25);
            transform: scale(1.03);
        }

        /* Botão Confirmar Presença com estilo */
        .link-whatsapp {
            position: absolute;
            bottom: 13%;
            left: 12%;
            width: 76%;
            height: 9%;
            cursor: pointer;
            z-index: 999;
            border-radius: 8px;
            background: rgba(37, 211, 102, 0.08);
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.15);
            transition: all 0.3s ease;
        }

        .link-whatsapp:hover {
            background: rgba(37, 211, 102, 0.18);
            box-shadow: 0 0 25px rgba(37, 211, 102, 0.3);
            transform: scale(1.02);
        }

        /* Música invisível e sem interferir */
        #musica {
            position: fixed;
            top: -9999px;
            left: -9999px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="convite">
        <!-- Botão Como Chegar -->
        <a 
            href="https://www.google.com/maps?q=Buffet+Tik+%26+Tok+Maia,+Av.+Papa+Jo%C3%A3o+XXIII,+64+-+Parque+Renato+Maia,+Guarulhos+-+SP,+07114-100" 
            target="_blank" 
            class="link-mapa"
            onclick="iniciarMusica()"
        ></a>

        <!-- Botão Confirmar Presença com mensagem exata -->
        <a 
            href="https://wa.me/5511979567755?text=Olá! Confirmo minha presença na festa da Andressa 🎉%0A%0ADia: 29/07/2026 às 19h30%0A%0A⚠️ Confirmações até o dia 20/07%0A%0APor favor, informe:%0A✅ Nome completo:%0A✅ Se for criança, qual a idade:" 
            target="_blank" 
            class="link-whatsapp"
            onclick="iniciarMusica()"
        ></a>

        <!-- Arquivo de música -->
        <audio id="musica" loop preload="auto">
            <source src="festa.mp3" type="audio/mpeg">
        
    </div>

    <script>
        let tocou = false;
        const audio = document.getElementById("musica");

        function iniciarMusica() {
            if (!tocou) {
                audio.play()
                    .then(() => { tocou = true; })
                    .catch(() => {});
            }
        }

        // Funciona em celular e computador
        document.addEventListener("touchstart", iniciarMusica);
        document.addEventListener("click", iniciarMusica);
    </script>
</body>
</html>
